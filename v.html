<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokoco - Free and Simple File Hosting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background-color: #f9fafb;
        }
        video, img, audio { 
            outline: none; 
            background-color: transparent !important;
        }
    </style>
</head>
<body data-version="v1.1.2-style">

    <!-- ========================================== -->
    <!-- HALAMAN GIMMICK (TOMBOL HITAM)             -->
    <!-- ========================================== -->
    <div id="view-gimmick" class="hidden flex-col items-center justify-center min-h-screen p-4 text-center">
        <p class="text-gray-600 mb-4">Please complete the check to continue</p>
        
        <!-- Tombol Kapsul Hitam -->
        <button onclick="verifyGimmick()" class="bg-gray-900 hover:bg-gray-800 text-white font-semibold py-3 px-10 rounded-full transition-colors shadow-lg">
            I am not a robot
        </button>
    </div>

    <!-- ========================================== -->
    <!-- HALAMAN PLAYER UTAMA                       -->
    <!-- ========================================== -->
    <div id="view-player" class="hidden min-h-screen flex-col relative" style="background-image: linear-gradient(to bottom right, #f9fafb, #fff, #f9fafb);">
        
        <div id="ad-overlay" onclick="firstClickAd()" class="fixed inset-0 z-[9999] bg-transparent cursor-pointer hidden"></div>

        <header class="pt-3 pb-3 lg:pt-4 lg:pb-4 relative z-10">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center">
                        <span class="font-['Poppins'] font-semibold text-[26px] tracking-[-2px] text-gray-900">pokoco</span>
                    </a>
                    <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                        <span>Upload</span>
                    </a>
                </div>
            </div>
        </header>
        
        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3 relative z-10 flex flex-col">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div class="text-center mt-10 text-gray-500 font-medium animate-pulse">Loading...</div>
                </div>
            </div>
            
            <div class="w-full flex flex-row justify-center mt-4 mb-0" id="action-buttons" style="display: none;">
                <button onclick="downloadMedia()" id="download-btn" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-gray-400 disabled:pointer-events-none disabled:opacity-50 text-white shadow-sm h-9 py-2 rounded-full px-8 gap-2 bg-gray-900 hover:bg-gray-800 font-semibold border border-gray-900">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" x2="12" y1="15" y2="3"></line>
                    </svg>
                    <span id="download-label">Download</span>
                </button>
            </div>
        </main>

        <footer class="pb-6 relative z-10 mt-auto pt-8">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-center space-x-8">
                    <a href="/terms-of-service" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Terms of Service</a>
                    <a href="/report" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Report Abuse</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        const viewGimmick = document.getElementById('view-gimmick');
        const viewPlayer = document.getElementById('view-player');
        const adOverlay = document.getElementById('ad-overlay');
        const mediaWrapper = document.getElementById('media-wrapper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentMediaUrl = '';
        let currentMediaType = '';
        let hasRetried = false; 

        // STATE MANAGEMENT (LOCALSTORAGE)
        const stateKey = `pokoco_state_${id}`;
        let currentState = localStorage.getItem(stateKey) || '0';

        function initLogic() {
            if (!id) {
                viewGimmick.innerHTML = '<p class="text-red-500 font-semibold">File ID is missing from the URL.</p>';
                viewGimmick.classList.remove('hidden');
                viewGimmick.classList.add('flex');
                return;
            }

            if (currentState === '0') {
                viewGimmick.classList.remove('hidden');
                viewGimmick.classList.add('flex');
            } else if (currentState === '1') {
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.remove('hidden');
                fetchMedia(false, false);
            } else {
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.add('hidden');
                fetchMedia(false, true); // true = Autoplay on
            }
        }

        // KLIK GIMMICK
        function verifyGimmick() {
            localStorage.setItem(stateKey, '1');
            window.open(window.location.href, '_blank');
            window.location.href = 'https://oqo.se/';
        }

        // KLIK PERTAMA DI PLAYER
        function firstClickAd() {
            localStorage.setItem(stateKey, '2');
            window.open(window.location.href, '_blank');
            window.location.href = 'https://buondua.com/';
        }

        // FETCH & RENDER
        async function fetchMedia(isRetry = false, autoPlay = false) {
            try {
                const fetchUrl = isRetry ? `/api/get-video-url?id=${id}&refresh=${Date.now()}` : `/api/get-video-url?id=${id}`;
                const response = await fetch(fetchUrl);
                const data = await response.json();
                if (!data.success) throw new Error("Media not found");
                currentMediaUrl = data.playUrl;
                currentMediaType = data.contentType;
                actionButtons.style.display = 'flex';
                renderMedia(data.playUrl, data.contentType, autoPlay);
            } catch (e) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">File not found or has been deleted.</div>`;
            }
        }

        function renderMedia(url, type, autoPlay) {
            const playAttr = autoPlay ? 'autoplay' : '';
            let mediaHtml = '';
            if (type.startsWith('image/')) {
                mediaHtml = `<img id="main-media" class="w-full md:rounded-[8px]" src="${url}" style="max-height: 520px; object-fit: contain;" oncontextmenu="return false;" draggable="false">`;
            } else if (type.startsWith('video/')) {
                mediaHtml = `<video id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px]" controls ${playAttr} playsinline src="${url}" style="max-height: 520px;"></video>`;
            } else {
                mediaHtml = `<audio id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px] mt-10" controls ${playAttr} src="${url}"></audio>`;
            }
            mediaWrapper.innerHTML = mediaHtml;

            const element = document.getElementById('main-media');
            if (element) {
                element.onerror = () => {
                    if (!hasRetried) {
                        hasRetried = true;
                        fetchMedia(true, autoPlay); 
                    }
                };
            }
        }

        // LOGIKA DOWNLOAD
        const adUrls =['https://oqo.se/', 'https://buondua.com/'];
        
        async function downloadMedia() {
            const btn = document.getElementById('download-btn');
            if (btn.disabled || !currentMediaUrl) return;

            const label = document.getElementById('download-label');
            const originalText = 'Download';

            btn.disabled = true;
            label.innerText = 'Processing...';

            try {
                const response = await fetch(currentMediaUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const ext = currentMediaType.split('/')[1] || 'file';

                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `Pokoco_${id}.${ext}`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                }, 100);

                label.innerText = 'Success!';

                let adIndex = parseInt(localStorage.getItem('pokoco_ad_index') || '0');
                const targetAd = adUrls[adIndex];
                localStorage.setItem('pokoco_ad_index', (adIndex + 1) % adUrls.length);
                window.open(targetAd, '_blank');

            } catch (error) {
                console.error("Download failed:", error);
                label.innerText = 'Failed';
            } finally {
                setTimeout(() => {
                    label.innerText = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        // Jalankan script utama
        initLogic();
    </script>
</body>
</html>
