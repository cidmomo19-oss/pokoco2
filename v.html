        }

        function prefetchSafe(url) {
            const prefetch = document.createElement('link'); prefetch.rel = 'prefetch';

        function showCustomAlert(message) {
            const alertBox = document.getElementById('custom-alert');
            const alertMessage = document.getElementById('alert-message');
            
            clearTimeout(alertTimeout); // Hapus timer sebelumnya jika ada
            
            alertMessage.textContent = message;
            alertBox.classList.remove('hidden');
            
            // Trik untuk memicu transisi CSS
            setTimeout(() => {
                alertBox.classList.remove('opacity-0');
            }, 10);
            
            // Sembunyikan notifikasi setelah 3 detik
            alertTimeout = setTimeout(() => {
                alertBox.classList.add('opacity-0');
                // Tunggu animasi fade-out selesai sebelum benar-benar disembunyikan
                setTimeout(() => {
                    alertBox.classList.add('hidden');
                }, 300); // 300ms sesuai durasi transisi
