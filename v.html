<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokoco - Media Preview</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-version="v1.0.5">
    <div id="root">
        <div class="min-h-screen">
            <div class="min-h-screen flex flex-col">
                <header class="pt-3 pb-3 lg:pt-4 lg:pb-4">
                    <div class="max-w-6xl mx-auto px-6 lg:px-8">
                        <div class="flex items-center justify-between">
                            <a href="/" class="flex items-center">
                                <span class="font-semibold text-[26px] tracking-[-2px] text-gray-900" style="font-family: 'Poppins', sans-serif;">pokoco</span>
                            </a>
                            <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                                <span>Upload</span>
                            </a>
                        </div>
                    </div>
                </header>

                <div class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3">
                    <div class="w-full flex justify-center">
                        <div class="w-full" id="media-wrapper">
                            <!-- Loader -->
                            <div class="flex items-center justify-center h-[300px]">
                                <span class="text-gray-400 font-medium">Loading media...</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="w-full flex flex-col items-center mt-4 mb-0">
                        <button id="share-btn" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 text-gray-700 shadow-sm h-9 py-2 rounded-full px-6 gap-2 bg-gray-100 hover:bg-gray-200 font-semibold border border-gray-200/50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share w-[18px] h-[18px]"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" x2="12" y1="2" y2="15"></line></svg>
                            Share link
                        </button>
                    </div>
                </div>

                <footer class="pb-6 mt-10">
                    <div class="max-w-6xl mx-auto px-6 lg:px-8">
                        <div class="flex items-center justify-center space-x-8">
                            <a href="#" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Terms of Service</a>
                            <a href="#" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Report Abuse</a>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
