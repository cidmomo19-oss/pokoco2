<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokoco - Free and Simple File Hosting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        html {
            overflow-y: scroll;
            min-height: 100vh;
            background-image: linear-gradient(to bottom right, #f9fafb, #fff, #f9fafb);
            background-color: #f9fafb;
        }
        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
            color: #1a1a1a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Menghilangkan background hitam bawaan browser pada video */
        video, img, audio { 
            outline: none; 
            background-color: transparent !important;
        }
    </style>
</head>
<body data-version="v1.0.5">
    <div id="root">
        <div class="min-h-screen">
            <div class="min-h-screen flex flex-col">
                <header class="pt-3 pb-3 lg:pt-4 lg:pb-4">
                    <div class="max-w-6xl mx-auto px-6 lg:px-8">
                        <div class="flex items-center justify-between">
                            <a href="/" class="flex items-center">
                                <span class="font-['Poppins'] font-semibold text-[26px] tracking-[-2px] text-gray-900">pokoco</span>
                            </a>
                            <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                                <span>Upload</span>
                            </a>
                        </div>
                    </div>
                </header>
                
                <div class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3">
                    <div class="w-full flex justify-center">
                        <div class="w-full" id="media-wrapper">
                            <!-- Loading Text -->
                            <div class="text-center mt-10 text-gray-500 font-medium animate-pulse">Loading...</div>
                        </div>
                    </div>
                    
                    <!-- Container Tombol -->
                    <div class="w-full flex flex-row justify-center gap-3 mt-4 mb-0" id="action-buttons" style="display: none;">
                        
                        <!-- Tombol Download Baru -->
                        <button onclick="downloadMedia()" id="download-btn" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-gray-400 disabled:pointer-events-none disabled:opacity-50 text-white shadow-sm h-9 py-2 rounded-full px-6 gap-2 bg-gray-900 hover:bg-gray-800 font-semibold border border-gray-900">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" x2="12" y1="15" y2="3"></line>
                            </svg>
                            <span id="download-label">Download</span>
                        </button>

                        <!-- Tombol Share Lama -->
                        <button onclick="shareMedia()" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-gray-400 disabled:pointer-events-none disabled:opacity-50 text-gray-700 shadow-sm h-9 py-2 rounded-full px-6 gap-2 bg-gray-100 hover:bg-gray-200 font-semibold border border-gray-200">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share w-[18px] h-[18px]">
                                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                                <polyline points="16 6 12 2 8 6"></polyline>
                                <line x1="12" x2="12" y1="2" y2="15"></line>
                            </svg>
                            <span id="share-label">Share link</span>
                        </button>
                    </div>
                </div>

                <footer class="pb-6">
                    <div class="max-w-6xl mx-auto px-6 lg:px-8">
                        <div class="flex items-center justify-center space-x-8">
                            <a href="/terms-of-service" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Terms of Service</a>
                            <a href="/report" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Report Abuse</a>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const mediaWrapper = document.getElementById('media-wrapper');
        const shareLabel = document.getElementById('share-label');
        const actionButtons = document.getElementById('action-buttons');
        
        // Simpan data media secara global untuk fitur download
        let currentMediaUrl = '';
        let currentMediaType = '';

        async function fetchMedia() {
            if (!id) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">Video not found.</div>`;
                return;
            }
            
            try {
                const response = await fetch(`/api/get-video-url?id=${id}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error("Media not found");
                }

                // Simpan URL dan tampilkan tombol
                currentMediaUrl = data.playUrl;
                currentMediaType = data.contentType;
                actionButtons.style.display = 'flex';

                renderMedia(data.playUrl, data.contentType);

                // Track view setelah 5 detik
                setTimeout(() => {
                    if(!sessionStorage.getItem(`viewed_${id}`)) {
                        fetch('/api/track-view', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: id }),
                            keepalive: true
                        }).then(() => sessionStorage.setItem(`viewed_${id}`, 'true')).catch(() => {});
                    }
                }, 5000);

            } catch (e) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">Video not found or has been deleted.</div>`;
            }
        }

        function renderMedia(url, type) {
            let mediaHtml = '';
            
            if (type.startsWith('image/')) {
                mediaHtml = `<img id="main-media" class="w-full md:rounded-[8px]" src="${url}" style="max-height: 520px; object-fit: contain;">`;
                shareLabel.innerText = 'Share image';
            } else if (type.startsWith('video/')) {
                // Menambahkan controlsList="nodownload" untuk menghapus tombol download bawaan player
                mediaHtml = `<video id="main-media" controlsList="nodownload" class="w-full md:rounded-[8px]" controls autoplay playsinline src="${url}" style="max-height: 520px;"></video>`;
                shareLabel.innerText = 'Share video';
            } else {
                mediaHtml = `<audio id="main-media" controlsList="nodownload" class="w-full md:rounded-[8px] mt-10" controls src="${url}"></audio>`;
                shareLabel.innerText = 'Share audio';
            }

            mediaWrapper.innerHTML = mediaHtml;

            const element = document.getElementById('main-media');
            if (element) {
                element.onerror = () => {
                    console.log("Link expired, fetching new one...");
                    fetchMedia(); 
                };
            }
        }

        // FUNGSI BARU: Download langsung tanpa tab baru
        async function downloadMedia() {
            if (!currentMediaUrl) return;

            const btn = document.getElementById('download-btn');
            const label = document.getElementById('download-label');
            const originalText = label.innerText;

            try {
                // Ubah status tombol
                label.innerText = 'Downloading...';
                btn.disabled = true;
                btn.classList.add('opacity-50');

                // Fetch data sebagai blob (menghindari tab baru/cross-origin issue)
                const response = await fetch(currentMediaUrl);
                const blob = await response.blob();
                
                // Buat URL sementara dari blob tersebut
                const blobUrl = window.URL.createObjectURL(blob);
                
                // Dapatkan ekstensi file dari contentType (misal: video/mp4 -> mp4)
                const ext = currentMediaType.split('/')[1] || 'file';

                // Buat elemen <a> virtual untuk men-trigger download
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = `Pokoco_${id}.${ext}`;
                document.body.appendChild(a);
                a.click(); // Trigger klik download
                
                // Bersihkan blob dari memory
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);

                label.innerText = 'Downloaded!';
            } catch (error) {
                console.error("Gagal mendownload:", error);
                label.innerText = 'Failed';
            } finally {
                // Kembalikan tombol seperti semula setelah 2 detik
                setTimeout(() => {
                    label.innerText = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }, 2000);
            }
        }

        function shareMedia() {
            if (navigator.share) {
                navigator.share({ title: `Pokoco`, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                const originalText = shareLabel.innerText;
                shareLabel.innerText = 'Copied!';
                setTimeout(() => { shareLabel.innerText = originalText; }, 2000);
            }
        }

        // Jalankan fetch pertama kali
        fetchMedia();
    </script>
</body>
</html>
