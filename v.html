<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a" />
    <title>Pokoco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        video, img { max-height: 520px; width: 100%; object-fit: contain; display: block; border-radius: 8px; background: transparent; }
        .btn-subtle { background-color: #1e293b; border: 1px solid #334155; transition: all 0.2s; }
        .btn-subtle:hover { background-color: #334155; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="py-4 lg:py-5">
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
            <a href="/" class="font-semibold text-[26px] tracking-[-2px]">pokoco</a>
            <a href="/" class="btn-subtle px-4 py-1.5 rounded-full text-[13px] font-semibold">Upload</a>
        </div>
    </header>

    <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 mt-2">
        <div id="media-wrapper" class="w-full flex justify-center min-h-[250px] items-center">
            <div class="animate-pulse text-slate-500 text-sm">Loading...</div>
        </div>

        <!-- Tombol Share yang diperkecil (Ukuran Pas) -->
        <div class="flex justify-center mt-6">
            <button onclick="shareMedia()" class="btn-subtle px-5 py-2 rounded-full text-[13px] font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" x2="12" y1="2" y2="15"></line></svg>
                <span id="share-label">Share link</span>
            </button>
        </div>
    </main>

    <footer class="py-10 text-center text-[11px] text-slate-600 space-x-6">
        <a href="#" class="hover:text-white">Terms</a>
        <a href="#" class="hover:text-white">Report</a>
    </footer>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        async function loadMedia() {
            if (!id) return;
            try {
                const res = await fetch(`/api/get-video-url?id=${id}`);
                const data = await res.json();
                const wrapper = document.getElementById('media-wrapper');
                if (data.success) {
                    if (data.contentType.startsWith('image/')) {
                        wrapper.innerHTML = `<img src="${data.playUrl}">`;
                        document.getElementById('share-label').innerText = 'Share image';
                    } else {
                        wrapper.innerHTML = `<video id="player" controls autoplay playsinline src="${data.playUrl}"></video>`;
                        document.getElementById('share-label').innerText = 'Share video';
                        document.getElementById('player').onerror = loadMedia; // Auto-refresh link 3 jam
                    }
                }
            } catch (e) { document.getElementById('media-wrapper').innerHTML = "Deleted or not found."; }
        }
        window.onload = loadMedia;
        function shareMedia() {
            navigator.share ? navigator.share({url: window.location.href}) : (navigator.clipboard.writeText(window.location.href), alert("Copied!"));
        }
    </script>
</body>
</html>
