<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Meta Title & SEO Umum -->
    <title>Pokoco - Watch Media</title>
    <meta name="description" content="Click to verify and watch the video securely on Pokoco." />

    <!-- LOGO UNTUK BROWSER (FAVICON) -->
    <link rel="icon" href="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" type="image/png" />

    <!-- LOGO & PREVIEW UNTUK WHATSAPP / FACEBOOK / GOOGLE -->
    <meta property="og:title" content="Pokoco - Secure Video Player" />
    <meta property="og:description" content="Verify your connection to watch this media securely." />
    <meta property="og:image" content="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" />
    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />
    <meta property="og:type" content="website" />

    <!-- LOGO & PREVIEW UNTUK TWITTER / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pokoco - Secure Video Player" />
    <meta name="twitter:description" content="Verify your connection to watch this media securely." />
    <meta name="twitter:image" content="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; overflow-x: hidden; }
        video, img { max-height: 520px; width: 100%; outline: none; object-fit: contain; display: block; border-radius: 8px; }
        .text-gray-pokoco { color: #64748b; }
        
        /* TOMBOL KAPSUL MENCOLOK DENGAN EFEK PULSE (BERDETAK) */
        .capsule-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); /* Gradasi Biru ke Ungu Terang */
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            animation: pulse-glow 2s infinite;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .capsule-btn:hover {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.7), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            animation: none; /* Matikan pulse saat di-hover */
        }
        
        /* Animasi Efek Menyala / Detak Jantung */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- HALAMAN 1: VERIFIKASI LAYAR PENUH          -->
    <!-- ========================================== -->
    <div id="verify-page" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#0f172a] transition-opacity duration-500">
        
        <!-- Tambahan Logo Pokoco di Halaman Verifikasi -->
        <div class="mb-8 text-center flex flex-col items-center">
            <img src="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" alt="Pokoco Logo" class="w-20 h-20 mb-3 object-contain rounded-full shadow-lg shadow-blue-500/20">
            <h1 class="font-semibold text-[28px] tracking-[-1px] text-white mb-1">Secure Check</h1>
            <p class="text-slate-400 text-sm">Please verify to access media</p>
        </div>

        <!-- Tombol Kapsul Mencolok -->
        <button id="capsule-btn" onclick="startVerification()" class="capsule-btn relative flex items-center gap-4 px-8 py-4 rounded-full transition-all duration-300 transform active:scale-95 group overflow-hidden cursor-pointer">
            <!-- Icon -->
            <div id="btn-icon" class="text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
            </div>
            
            <span id="btn-text" class="text-white font-semibold tracking-wide text-[16px] drop-shadow-md">I am not a robot</span>
            
            <!-- Efek Kilap (Glow Sweep) di dalam Tombol -->
            <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
        </button>

        <div id="verify-error" class="mt-8 text-red-400 text-sm hidden">Invalid ID provided.</div>
    </div>


    <!-- ========================================== -->
    <!-- NOTIFIKASI SAAT NONTON (MELAYANG)          -->
    <!-- ========================================== -->
    <div id="watch-toast" class="fixed top-6 right-6 z-[200] flex items-center gap-3 bg-[#1e293b]/95 backdrop-blur-sm border border-slate-700 p-3 pr-4 rounded-2xl shadow-2xl transform translate-x-[150%] transition-transform duration-700 ease-out">
        <img src="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" class="w-10 h-10 rounded-full object-cover border border-slate-600">
        <div class="flex flex-col">
            <span class="text-white text-[13px] font-semibold leading-tight">Pokoco Secure</span>
            <span class="text-blue-400 text-[11px] font-medium mt-0.5">Media siap diputar!</span>
        </div>
        <!-- Tombol Close (X) -->
        <button onclick="document.getElementById('watch-toast').style.transform = 'translate-x-[150%]'" class="ml-3 text-slate-500 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>


    <!-- ========================================== -->
    <!-- HALAMAN 2: PLAYER VIDEO (Asli)             -->
    <!-- ========================================== -->
    <div id="main-page" class="min-h-screen flex flex-col hidden opacity-0 transition-opacity duration-500">
        <header class="pt-4 pb-3 lg:pt-5 lg:pb-4">
            <div class="max-w-6xl mx-auto px-6 lg:px-8 flex items-center justify-between">
                <a href="/" class="flex items-center gap-3">
                    <img src="https://i.ibb.co.com/chp7mRCY/Picsart-26-03-26-09-59-08-531.png" alt="Logo" class="w-8 h-8 rounded-full">
                    <span class="font-semibold text-[26px] tracking-[-2px] text-white">pokoco</span>
                </a>
                <a href="/" class="flex items-center px-5 py-1.5 bg-[#1e293b] hover:bg-[#334155] text-white font-semibold rounded-full transition-colors text-[15px] border border-slate-800 shadow-sm">
                    <span>Upload</span>
                </a>
            </div>
        </header>

        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-4">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div class="flex flex-col items-center justify-center w-full h-[250px]">
                        <div class="w-8 h-8 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-3"></div>
                        <span class="text-gray-pokoco text-sm animate-pulse">Loading media...</span>
                    </div>
                </div>
            </div>

            <div id="share-container" class="w-full flex flex-col items-center mt-6 mb-0 hidden">
                <button onclick="shareMedia()" class="inline-flex items-center justify-center text-sm text-white h-10 py-2 rounded-full px-8 gap-2 bg-[#1e293b] hover:bg-[#334155] font-semibold border border-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
                    <span id="share-label">Share link</span>
                </button>
            </div>
        </main>

        <footer class="pb-8 mt-12">
            <div class="max-w-6xl mx-auto px-6 text-center text-gray-pokoco text-xs space-x-6">
                <a href="#" class="hover:text-white">Terms of Service</a>
                <a href="#" class="hover:text-white">Report Abuse</a>
            </div>
        </footer>
    </div>


    <!-- ========================================== -->
    <!-- SCRIPT LOGIKA UTAMA                        -->
    <!-- ========================================== -->
    <script>
        const verifyPage = document.getElementById('verify-page');
        const mainPage = document.getElementById('main-page');
        const mediaWrapper = document.getElementById('media-wrapper');
        const shareContainer = document.getElementById('share-container');
        const shareLabel = document.getElementById('share-label');
        
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        window.onload = function() {
            if (!id) {
                document.getElementById('capsule-btn').classList.add('hidden');
                document.getElementById('verify-error').classList.remove('hidden');
            }
        };

        function startVerification() {
            const btn = document.getElementById('capsule-btn');
            const btnIcon = document.getElementById('btn-icon');
            const btnText = document.getElementById('btn-text');

            // Ubah Tampilan Kapsul (Loading)
            btn.classList.add('pointer-events-none');
            btn.style.animation = 'none'; // matikan pulse
            btn.style.opacity = '0.9';
            btnIcon.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;
            btnText.innerText = "Verifying...";

            // Jeda Gimmick, Pindah Halaman
            setTimeout(() => {
                verifyPage.style.opacity = '0';
                setTimeout(() => {
                    verifyPage.classList.add('hidden');
                    mainPage.classList.remove('hidden');
                    setTimeout(() => { mainPage.style.opacity = '1'; }, 50);

                    fetchAndLoadMedia();
                }, 500); 
            }, 1200); 
        }

        async function fetchAndLoadMedia() {
            try {
                const response = await fetch(`/api/get-video-url?id=${id}`);
                const data = await response.json();

                if (data.success) {
                    const { playUrl, contentType, adLink } = data;
                    shareContainer.classList.remove('hidden');
                    
                    if (contentType.startsWith('image/')) {
                        mediaWrapper.innerHTML = `<img src="${playUrl}" class="md:rounded-[8px]" alt="Image content">`;
                        shareLabel.innerText = 'Share image';
                        document.title = 'Pokoco - Image';
                    } else if (contentType.startsWith('video/')) {
                        shareLabel.innerText = 'Share video';
                        document.title = 'Pokoco - Video';

                        // MUNCULKAN NOTIFIKASI PAS NONTON (Delay 1.5 detik)
                        setTimeout(() => {
                            const toast = document.getElementById('watch-toast');
                            toast.style.transform = 'translate-x-0'; // Slide In
                            // Otomatis hilang setelah 5 detik
                            setTimeout(() => {
                                toast.style.transform = 'translate-x-[150%]';
                            }, 5000);
                        }, 1500);

                        // LOGIKA PREFETCH IKLAN
                        if(adLink) {
                            const prefetch = document.createElement('link');
                            prefetch.rel = 'prefetch'; 
                            prefetch.href = adLink;
                            document.head.appendChild(prefetch);
                        }

                        // RENDER PLAYER & IKLAN REDIRECT 1 KLIK
                        mediaWrapper.innerHTML = `
                            <div class="relative w-full md:rounded-[8px] overflow-hidden bg-black shadow-2xl">
                                <video id="main-player" class="w-full" playsinline controls src="${playUrl}"></video>
                                <div id="ad-overlay" class="absolute inset-0 z-50 flex items-center justify-center cursor-pointer" style="background: rgba(0, 0, 0, 0.0);"></div>
                            </div>`;
                         
                         const player = document.getElementById('main-player');
                         const overlay = document.getElementById('ad-overlay');

                         if(overlay && adLink) {
                             overlay.addEventListener('click', function() {
                                 player.play();
                                 overlay.remove(); // Hancurkan overlay (1x klik)

                                 setTimeout(() => {
                                     window.location.href = adLink; // Redirect Instan
                                 }, 800); 
                             });
                         } else if (overlay) {
                             overlay.addEventListener('click', function() {
                                 player.play();
                                 overlay.remove();
                             });
                         }
                    }
                } else {
                    throw new Error("Failed to load media.");
                }
            } catch (e) {
                shareContainer.classList.add('hidden');
                mediaWrapper.innerHTML = `<div class="text-center py-24 text-white font-semibold">Media not found or expired.</div>`;
            }
        }

        function shareMedia() {
            const label = shareLabel.innerText;
            if (navigator.share) {
                navigator.share({ title: `Pokoco - ${label}`, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied!");
            }
        }
    </script>
</body>
</html>
