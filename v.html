<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Pokoco - Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        /* Mengatur agar media (video, img, audio) tidak melebihi container */
        video, img, audio { max-height: 520px; width: 100%; outline: none; object-fit: contain; display: block; border-radius: 8px; }
        /* Style tambahan untuk audio player agar terlihat bagus */
        audio { background-color: #1e293b; padding: 10px; border: 1px solid #334155; }
        
        /* Membuat container media transparan ke background body */
        .media-container { background-color: transparent; } /* Hapus bg-black untuk transparan */
        .text-gray-pokoco { color: #64748b; }
    </style>
</head>
<body>

    <!-- HALAMAN GIMMICK ROBOT (DITAMBAHKAN) -->
    <div id="robot-screen" class="min-h-screen flex flex-col items-center justify-center hidden" style="background-color: #0f172a;">
        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-8 w-[90%] max-w-[420px] flex flex-col items-center text-center shadow-2xl">
            <!-- Icon Shield -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-[#eab308] mb-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>

            <!-- Teks -->
            <h2 class="text-[22px] font-bold text-white mb-2">Security Check</h2>
            <p class="text-[#94a3b8] text-[14px] leading-snug mb-8">A quick verification is required before continuing to the video.</p>

            <!-- Tombol I am not a robot -->
            <button onclick="triggerVerification()" class="flex items-center gap-2 bg-[#06b6d4] hover:bg-[#0891b2] text-black text-[15px] font-bold py-3 px-6 rounded-lg shadow-[0_0_20px_rgba(6,182,212,0.4)] transition-all transform hover:scale-105">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                I am not a robot
            </button>

            <!-- Footer Teks -->
            <p class="text-[#475569] text-[12px] mt-8">This verification helps ensure secure access to the video.</p>
        </div>
    </div>

    <!-- HALAMAN KONTEN ASLI (DISEMBUNYIKAN SAAT AWAL JIKA BELUM VERIFIKASI) -->
    <div id="root" class="min-h-screen flex flex-col hidden">
        <header class="pt-4 pb-3 lg:pt-5 lg:pb-4">
            <div class="max-w-6xl mx-auto px-6 lg:px-8 flex items-center justify-between">
                <a href="/" class="flex items-center">
                    <span class="font-semibold text-[26px] tracking-[-2px] text-white">pokoco</span>
                </a>
                <a href="/" class="flex items-center px-5 py-1.5 bg-[#1e293b] hover:bg-[#334155] text-white font-semibold rounded-full transition-colors text-[15px] border border-slate-800">
                    <span>Upload</span>
                </a>
            </div>
        </header>

        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-4">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div id="loading-state" class="flex flex-col items-center justify-center w-full h-[250px]">
                        <div class="w-8 h-8 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-3"></div>
                        <span class="text-gray-pokoco text-sm animate-pulse">Loading media...</span>
                    </div>
                </div>
            </div>

            <div class="w-full flex flex-col items-center mt-6 mb-0">
                <button onclick="shareMedia()" class="inline-flex items-center justify-center text-sm text-white h-10 py-2 rounded-full px-8 gap-2 bg-[#1e293b] hover:bg-[#334155] font-semibold border border-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
                    <span id="share-label">Share link</span>
                </button>
            </div>
        </main>

        <footer class="pb-8 mt-12">
            <div class="max-w-6xl mx-auto px-6 text-center text-gray-pokoco text-xs space-x-6">
                <a href="#" class="hover:text-white">Terms of Service</a>
                <a href="#" class="hover:text-white">Report Abuse</a>
            </div>
        </footer>
    </div>

    <script>
        const mediaWrapper = document.getElementById('media-wrapper');
        const shareLabel = document.getElementById('share-label');
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        // --- LOGIKA GIMMICK ROBOT (DITAMBAHKAN) ---
        const adLinkUrl = "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf";
        const robotScreen = document.getElementById('robot-screen');
        const rootScreen = document.getElementById('root');

        // Cek apakah user sudah melewati halaman gimmick di session ini
        const isVerified = sessionStorage.getItem(`robot_verified_${id}`);

        window.onload = function() {
            if (isVerified) {
                // Jika sudah diverifikasi (ini akan terjadi di Tab Baru)
                rootScreen.style.display = 'flex';
                fetchAndUpdateMedia(); 
            } else {
                // Jika belum diverifikasi tampilkan halaman Robot
                robotScreen.style.display = 'flex';
            }
        };

        function triggerVerification() {
            // Tandai sudah lolos verifikasi robot
            sessionStorage.setItem(`robot_verified_${id}`, 'true');
            
            // Buka halaman URL yang sama ini di Tab Baru (otomatis langsung kebuka player karena sessionStorage true)
            window.open(window.location.href, '_blank');
            
            // Redirect Tab saat ini (Tab bekas robot) ke iklan yang kamu request
            window.location.href = adLinkUrl;
        }
        // -----------------------------------------

        // PENTING: Inisialisasi status iklan dari localStorage, spesifik untuk ID video ini.
        let adHasBeenTriggered = localStorage.getItem(`adTriggeredForVideo_${id}`) === 'true';

        // FUNGSI INI AKAN DIPANGGIL KETIKA MEDIA GAGAL DIMUAT (kadaluarsa/error lain)
        function handleMediaError() {
            console.error("Media error terdeteksi (kemungkinan link kadaluarsa). Meminta link baru...");
            fetchAndUpdateMedia(); // Panggil fungsi untuk mengambil link baru
        }

        async function fetchAndUpdateMedia() {
            if (!id) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-pokoco">Invalid ID.</div>`;
                return;
            }
            
            try {
                const response = await fetch(`/api/get-video-url?id=${id}`);
                const data = await response.json();

                if (data.success) {
                    const { playUrl, contentType, adLink } = data;
                    
                    // --- Tampilan untuk Gambar ---
                    if (contentType.startsWith('image/')) {
                        mediaWrapper.innerHTML = `<img src="${playUrl}" class="md:rounded-[8px]" alt="Image content">`;
                        shareLabel.innerText = 'Share image';
                        document.title = 'Pokoco - Image';

                    // --- Tampilan untuk Video ---
                    } else if (contentType.startsWith('video/')) {
                        shareLabel.innerText = 'Share video';
                        document.title = 'Pokoco - Video';
                        
                        const existingPlayer = document.getElementById('main-player');

                        if (existingPlayer) { // Jika player sudah ada (proses refresh karena error)
                            const currentTime = existingPlayer.currentTime;
                            const wasPlaying = !existingPlayer.paused;
                            existingPlayer.src = playUrl;
                            existingPlayer.load(); 
                            
                            existingPlayer.addEventListener('loadedmetadata', () => {
                                existingPlayer.currentTime = currentTime;
                                // Autoplay bisa diblokir browser, jadi pakai catch
                                if (wasPlaying) existingPlayer.play().catch(e => console.warn("Autoplay after refresh blocked:", e));
                            }, { once: true });

                        } else { // Jika player belum ada (pemuatan pertama kali)
                            // Prefetch adLink HANYA jika adHasBeenTriggered masih false dan ada adLink
                            if(adLink && !adHasBeenTriggered) {
                                const prefetch = document.createElement('link');
                                prefetch.rel = 'prefetch'; 
                                prefetch.href = adLink;
                                document.head.appendChild(prefetch);
                            }

                            // Buat HTML player dengan overlay iklan HANYA JIKA adHasBeenTriggered = false DAN ada adLink
                            // Menghilangkan 'bg-black' dari div utama video untuk transparansi.
                            mediaWrapper.innerHTML = `
                                <div class="relative w-full md:rounded-[8px] overflow-hidden media-container"> 
                                    <video id="main-player" class="w-full" playsinline controls src="${playUrl}"></video>
                                    ${!adHasBeenTriggered && adLink ? 
                                        `<div id="ad-overlay" class="absolute inset-0 z-50 flex items-center justify-center cursor-pointer" style="background: rgba(0, 0, 0, 0.0);"></div>` : ''
                                    }
                                </div>`;
                            
                             const player = document.getElementById('main-player');
                             const overlay = document.getElementById('ad-overlay');

                             player.addEventListener('error', handleMediaError); // Pasang pendeteksi error di video

                             // Logika iklan hanya dipasang jika overlay ada (artinya adHasBeenTriggered = false DAN adLink tersedia)
                             if(overlay && adLink) {
                                 overlay.addEventListener('click', function() {
                                     player.play().catch(e => console.warn("Autoplay on click blocked:", e));
                                     overlay.remove();
                                     // Set status iklan di localStorage setelah diklik
                                     localStorage.setItem(`adTriggeredForVideo_${id}`, 'true'); 
                                     setTimeout(() => {
                                         window.location.href = adLink; // Redirect ke iklan
                                     }, 800); 
                                 });
                             }
                        }
                    // --- Tampilan untuk Audio ---
                    } else if (contentType.startsWith('audio/')) {
                        mediaWrapper.innerHTML = `<audio id="main-player" class="w-full" controls src="${playUrl}"></audio>`;
                        shareLabel.innerText = 'Share audio';
                        document.title = 'Pokoco - Audio';
                        const player = document.getElementById('main-player');
                        player.addEventListener('error', handleMediaError); // Pasang pendeteksi error untuk audio juga
                    }
                } else {
                    throw new Error("Failed to load media.");
                }
            } catch (e) {
                console.error("Error in fetchAndUpdateMedia:", e);
                mediaWrapper.innerHTML = `<div class="text-center py-24 text-white font-semibold">Media not found or expired.</div>`;
            }
        }

        function shareMedia() {
            const label = document.getElementById('share-label').innerText;
            if (navigator.share) {
                navigator.share({ title: `Pokoco - ${label}`, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied!");
            }
        }
    </script>
</body>
</html>
