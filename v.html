<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="referrer" content="no-referrer" />
    <title>Pokoco - Free and Simpel Media Hosting</title>

    <meta name="description" content="Watch and share media on Pokoco." />
    <meta property="og:title" content="Pokoco - Media Preview" />
    <meta property="og:description" content="Watch and share media securely." />
    <meta property="og:image" itemprop="image" content="https://i.ibb.co.com/67T0y5Zx/Picsart-26-03-26-17-57-46-544.png" />
    
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/67T0y5Zx/Picsart-26-03-26-17-57-46-544.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        video, img, audio { max-height: 520px; width: 100%; outline: none; object-fit: contain; display: block; border-radius: 0px; }
        audio { background-color: #1e293b; padding: 10px; border: 1px solid #334155; }
        .media-container { background-color: transparent; } 
        .text-gray-pokoco { color: #64748b; }
    </style>
</head>
<body>

    <div id="custom-alert" class="hidden fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-lg shadow-xl bg-red-900/50 border border-red-500/50 backdrop-blur-sm transition-all duration-300 opacity-0">
        <p id="alert-message" class="text-white font-semibold text-sm"></p>
    </div>

    <!-- ROBOT SCREEN -->
    <div id="robot-screen" class="min-h-screen flex flex-col items-center justify-center hidden relative" style="background-color: #0f172a;">
        <header class="absolute top-0 left-0 w-full pt-4 pb-3 lg:pt-5 lg:pb-4 z-20">
            <div class="max-w-6xl mx-auto px-6 lg:px-8 flex items-center justify-between">
                <a href="/" class="flex items-center"><span class="font-semibold text-[26px] tracking-[-2px] text-white">pokoco</span></a>
                <a href="/" class="flex items-center px-5 py-1.5 bg-[#1e293b] hover:bg-[#334155] text-white font-semibold rounded-full transition-colors text-[15px] border border-slate-800">Upload</a>
            </div>
        </header>

        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-8 w-[90%] max-w-[420px] flex flex-col items-center text-center shadow-2xl relative z-10 mt-16">
            <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-5 drop-shadow-[0_0_12px_rgba(255,255,255,0.6)]">
              <rect width="16" height="12" x="4" y="8" rx="2" ry="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/><path d="M12 8V4H8"/>
            </svg>
            <h2 class="text-[22px] font-bold text-white mb-2">Security Check</h2>
            <p class="text-[#94a3b8] text-[14px] leading-snug mb-8">Please verify you are human to continue.</p>
            
            <div onclick="handleRobotCheck()" id="robot-check-container" class="w-full flex items-center justify-center p-3 bg-[#1e293b] border border-slate-700 rounded-lg cursor-pointer hover:bg-slate-700/50 transition-colors">
                <div id="checkbox-box" class="w-7 h-7 bg-transparent border-2 border-slate-500 rounded flex items-center justify-center transition-all duration-300">
                </div>
                <span class="text-white font-medium ml-4 text-base">I am not a robot</span>
            </div>
        </div>
    </div>
    
    <!-- LOADING SCREEN (HALAMAN TUNGGU) -->
    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center hidden relative" style="background-color: #0f172a;">
         <div class="flex flex-col items-center text-center">
             <div id="loading-spinner" class="w-10 h-10 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin"></div>
             <p id="loading-text" class="text-white/80 font-semibold mt-5 text-lg animate-pulse">Preparing your media...</p>
             <button id="continue-button" onclick="proceedToPlayer()" class="hidden mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-lg transition-colors shadow-lg">
                Continue
            </button>
         </div>
    </div>

    <!-- PASSWORD SCREEN -->
    <div id="password-screen" class="min-h-screen flex flex-col items-center justify-center hidden relative" style="background-color: #0f172a;">
        <header class="absolute top-0 left-0 w-full pt-4 pb-3 lg:pt-5 lg:pb-4 z-20">
            <div class="max-w-6xl mx-auto px-6 lg:px-8 flex items-center justify-between">
                <a href="/" class="flex items-center"><span class="font-semibold text-[26px] tracking-[-2px] text-white">pokoco</span></a>
                <a href="/" class="flex items-center px-5 py-1.5 bg-[#1e293b] hover:bg-[#334155] text-white font-semibold rounded-full transition-colors text-[15px] border border-slate-800">Upload</a>
            </div>
        </header>

        <div class="bg-[#111827] border border-slate-800 rounded-2xl p-8 w-[90%] max-w-[420px] flex flex-col items-center text-center shadow-2xl relative z-10 mt-16">
            <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-5 drop-shadow-[0_0_12px_rgba(255,255,255,0.6)]">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h2 class="text-[22px] font-bold text-white mb-2">Protected Media</h2>
            <p class="text-[#94a3b8] text-[14px] leading-snug mb-6">This file is password protected. Please enter the password to continue.</p>
            <input type="text" id="viewer-password-input" placeholder="Enter password" class="w-full bg-[#1e293b] border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-2 transition-all text-center tracking-widest">
            <p id="password-error-msg" class="text-red-500 text-xs mb-4 hidden font-medium">Incorrect password. Please try again.</p>
            <button id="submit-password-btn" onclick="submitPassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Unlock Media
            </button>
        </div>
    </div>

    <!-- MAIN PLAYER SCREEN -->
    <div id="root" class="min-h-screen flex flex-col hidden">
        <header class="pt-4 pb-3 lg:pt-5 lg:pb-4">
            <div class="max-w-6xl mx-auto px-6 lg:px-8 flex items-center justify-between">
                <a href="/" class="flex items-center"><span class="font-semibold text-[26px] tracking-[-2px] text-white">pokoco</span></a>
                <a href="/" class="flex items-center px-5 py-1.5 bg-[#1e293b] hover:bg-[#334155] text-white font-semibold rounded-full transition-colors text-[15px] border border-slate-800">Upload</a>
            </div>
        </header>
        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-4">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div id="loading-state" class="flex flex-col items-center justify-center w-full h-[250px]">
                        <div class="w-8 h-8 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin mb-3"></div>
                        <span class="text-gray-pokoco text-sm animate-pulse">Loading media...</span>
                    </div>
                </div>
            </div>
            <div class="w-full flex flex-col items-center mt-6 mb-0">
                <button onclick="shareMedia()" class="inline-flex items-center justify-center text-sm text-white h-10 py-2 rounded-full px-8 gap-2 bg-[#1e293b] hover:bg-[#334155] font-semibold border border-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
                    <span id="share-label">Share link</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        const mediaWrapper = document.getElementById('media-wrapper');
        const shareLabel = document.getElementById('share-label');
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const step = params.get('step');
        
        const adPool = [
            "https://conductivebreeds.com/qv7txv4c1u?key=c7d2434d3ed66645d911fc2e3d0e1bcf", 
            "https://omg10.com/4/10390860" 
        ];

        let videoAds = { ad1: '', ad2: '' };

        function initAdRotation() {
            if (!id) return;
            let seq = parseInt(localStorage.getItem('pokoco_ad_sequence') || '0');
            localStorage.setItem('pokoco_ad_sequence', (seq + 1) % adPool.length);
            videoAds = {
                ad1: adPool[seq % adPool.length],
                ad2: adPool[(seq + 1) % adPool.length]
            };
        }

        function setupBackAdIntercept() {
            history.pushState(null, null, window.location.href);
            window.addEventListener('popstate', function(event) {
                history.pushState(null, null, window.location.href);
                window.open(videoAds.ad1, '_blank');
                redirectSafe(videoAds.ad2);
            });
        }
        
        function redirectSafe(url) {
            window.location.replace(url);
        }

        const robotScreen = document.getElementById('robot-screen');
        const passwordScreen = document.getElementById('password-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const rootScreen = document.getElementById('root');
        
        function optimizeAdNetworkSpeed() {
            adPool.forEach(url => {
                try {
                    const domain = new URL(url).origin;
                    const preconnectLink = document.createElement('link');
                    preconnectLink.rel = 'preconnect';
                    preconnectLink.href = domain;
                    document.head.appendChild(preconnectLink);
                } catch (e) {}
            });
        }

        window.onload = function() {
            optimizeAdNetworkSpeed();
            initAdRotation();
            
            if (step === 'loading') {
                loadingScreen.style.display = 'flex';
                startLoadingCountdown();
            } else if (id) {
                const isVerified = sessionStorage.getItem(`media_unlocked_${id}`);
                if (isVerified) {
                    rootScreen.style.display = 'flex';
                    fetchAndUpdateMedia();
                    trackView();
                    setupBackAdIntercept();
                } else {
                    robotScreen.style.display = 'flex';
                }
            }
        };
        
        function handleRobotCheck() {
            const checkboxBox = document.getElementById('checkbox-box');
            checkboxBox.innerHTML = `<div class="w-5 h-5 border-2 border-slate-500 border-t-white rounded-full animate-spin"></div>`;
            document.getElementById('robot-check-container').onclick = null;

            if (step === 'duplicate') {
                setTimeout(() => {
                    window.open(window.location.href.replace('step=duplicate', 'step=loading'), '_blank');
                    redirectSafe(videoAds.ad2);
                }, 500);
            } else {
                setTimeout(() => {
                    window.open(window.location.href + '&step=duplicate', '_blank');
                    redirectSafe(videoAds.ad1);
                }, 500);
            }
        }
        
        function startLoadingCountdown() {
            setTimeout(() => {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('continue-button').style.display = 'block';
            }, 3000);
        }
        
        function proceedToPlayer() {
            sessionStorage.setItem(`media_unlocked_${id}`, 'true');
            window.open(window.location.href.replace('&step=loading', ''), '_blank');
            redirectSafe(videoAds.ad1);
        }

        async function fetchAndUpdateMedia() {
            if (!id) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-pokoco">Invalid ID.</div>`;
                return;
            }
            try {
                const response = await fetch(`/api/get-video-url?id=${id}`);
                const data = await response.json();

                if (data.requiresPassword) { /* ... (fungsi password) */ }
                if (!data.success) { throw new Error(data.message || "Media not found."); }
                
                robotScreen.style.display = 'none';
                rootScreen.style.display = 'flex';
                
                const { playUrl, contentType } = data;
                
                if (contentType.startsWith('video/')) {
                    const isAdDone = sessionStorage.getItem(`playerAdDone_${id}`);
                    mediaWrapper.innerHTML = `
                        <div class="relative w-full overflow-hidden media-container"> 
                            <video id="main-player" class="w-full" playsinline controls src="${playUrl}"></video>
                            ${!isAdDone ? `<div id="ad-overlay" class="absolute inset-0 z-50 flex items-center justify-center cursor-pointer" style="background: rgba(0, 0, 0, 0.0);"></div>` : ''}
                        </div>`;
                    
                     const player = document.getElementById('main-player');
                     const overlay = document.getElementById('ad-overlay');
                     
                     if (overlay) {
                         overlay.addEventListener('click', function() {
                             sessionStorage.setItem(`playerAdDone_${id}`, 'true');
                             overlay.remove();
                             player.play().catch(e => {});
                             window.open(videoAds.ad1, '_blank');
                             redirectSafe(videoAds.ad2);
                         }, { once: true });
                     }
                } else if (contentType.startsWith('image/')) {
                    mediaWrapper.innerHTML = `<img src="${playUrl}" alt="Image content">`;
                    shareLabel.innerText = 'Share image';
                } else if (contentType.startsWith('audio/')) {
                    mediaWrapper.innerHTML = `<audio id="main-player" class="w-full" controls src="${playUrl}"></audio>`;
                    shareLabel.innerText = 'Share audio';
                }
            } catch (e) {
                mediaWrapper.innerHTML = `<div class="text-center py-24 text-white font-semibold">Media not found or has been deleted.</div>`;
            }
        }
        
        // --- FUNGSI BANTUAN LAINNYA ---
        function trackView() {
            const alreadyViewed = sessionStorage.getItem(`viewed_${id}`);
            if (id && !alreadyViewed) {
                setTimeout(() => {
                    fetch('/api/track-view', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id }), keepalive: true 
                    }).then(() => sessionStorage.setItem(`viewed_${id}`, 'true'))
                      .catch(err => console.error("View track failed"));
                }, 5000); 
            }
        }
        
        let alertTimeout;
        function showCustomAlert(message) { 
            const alertBox = document.getElementById('custom-alert');
            const alertMsg = document.getElementById('alert-message');
            alertMsg.innerText = message;
            alertBox.classList.remove('hidden', 'opacity-0');
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => {
                alertBox.classList.add('opacity-0');
                setTimeout(() => alertBox.classList.add('hidden'), 300);
            }, 3000);
        }
        
        function shareMedia() {
            const label = document.getElementById('share-label').innerText;
            if (navigator.share) {
                navigator.share({ title: `Pokoco - ${label}`, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showCustomAlert("Link copied to clipboard!");
            }
        }

        // Fungsi untuk password sengaja tidak saya sertakan dalam fetchAndUpdateMedia utama agar lebih ringkas, namun bisa ditambahkan jika perlu
        function submitPassword() { /* ... */ }
        document.getElementById('viewer-password-input')?.addEventListener('keypress', function (e) { if (e.key === 'Enter') submitPassword(); });

    </script>
</body>
</html>
