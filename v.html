<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokoco - Free and Simple File Hosting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        html {
            overflow-y: scroll;
            min-height: 100vh;
            background-image: linear-gradient(to bottom right, #f9fafb, #fff, #f9fafb);
            background-color: #f9fafb;
        }
        body {
            margin: 0;
            min-width: 320px;
            min-height: 100vh;
            color: #1a1a1a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        video, img, audio { 
            outline: none; 
            background-color: transparent !important;
        }
    </style>
</head>
<body data-version="v1.0.9">

    <!-- ========================================== -->
    <!-- HALAMAN GIMMICK (I AM NOT A ROBOT)         -->
    <!-- ========================================== -->
    <div id="view-gimmick" class="hidden flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center border border-gray-100">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
            </div>
            <h2 class="text-2xl font-semibold mb-3 text-gray-800">Security Verification</h2>
            <p class="text-gray-500 mb-8 text-sm leading-relaxed">
                Please verify that you are human to continue watching. This extra security step helps us prevent automated bots, mitigate server abuse, and ensure a safe browsing experience.
            </p>
            <button onclick="verifyGimmick()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-800 font-semibold py-3 px-6 rounded-xl transition-all shadow-sm">
                <input type="checkbox" class="w-5 h-5 rounded border-gray-300 text-blue-600 pointer-events-none">
                <span>I am not a robot</span>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- HALAMAN PLAYER UTAMA                       -->
    <!-- ========================================== -->
    <div id="view-player" class="hidden min-h-screen flex-col relative">
        
        <!-- Overlay Iklan (Click Pertama di Video) -->
        <div id="ad-overlay" onclick="firstClickAd()" class="fixed inset-0 z-[9999] bg-transparent cursor-pointer hidden"></div>

        <header class="pt-3 pb-3 lg:pt-4 lg:pb-4 relative z-10">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center">
                        <span class="font-['Poppins'] font-semibold text-[26px] tracking-[-2px] text-gray-900">pokoco</span>
                    </a>
                    <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                        <span>Upload</span>
                    </a>
                </div>
            </div>
        </header>
        
        <div class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3 relative z-10">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div class="text-center mt-10 text-gray-500 font-medium animate-pulse">Loading...</div>
                </div>
            </div>
            
            <div class="w-full flex flex-row justify-center mt-4 mb-0" id="action-buttons" style="display: none;">
                <button onclick="downloadMedia()" id="download-btn" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-gray-400 disabled:pointer-events-none disabled:opacity-50 text-white shadow-sm h-9 py-2 rounded-full px-8 gap-2 bg-gray-900 hover:bg-gray-800 font-semibold border border-gray-900">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" x2="12" y1="15" y2="3"></line>
                    </svg>
                    <span id="download-label">Download</span>
                </button>
            </div>
        </div>

        <footer class="pb-6 relative z-10">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-center space-x-8">
                    <a href="/terms-of-service" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Terms of Service</a>
                    <a href="/report" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Report Abuse</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        const viewGimmick = document.getElementById('view-gimmick');
        const viewPlayer = document.getElementById('view-player');
        const adOverlay = document.getElementById('ad-overlay');
        const mediaWrapper = document.getElementById('media-wrapper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentMediaUrl = '';
        let currentMediaType = '';
        let hasRetried = false; 

        // ==========================================
        // 1. STATE MANAGEMENT (LOCALSTORAGE)
        // ==========================================
        const stateKey = `pokoco_state_${id}`;
        let currentState = localStorage.getItem(stateKey) || '0';

        function initLogic() {
            if (currentState === '0') {
                // Munculin Gimmick
                viewGimmick.classList.remove('hidden');
                viewGimmick.classList.add('flex');
            } else if (currentState === '1') {
                // Munculin Player tapi ditutup Overlay
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.remove('hidden');
                fetchMedia(false);
            } else {
                // Munculin Player, BEBAS Overlay, dan AUTOPLAY
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.add('hidden');
                fetchMedia(false, true); // true = Autoplay on
            }
        }

        // ==========================================
        // 2. KLIK GIMMICK
        // ==========================================
        function verifyGimmick() {
            localStorage.setItem(stateKey, '1'); // Update state
            window.open(window.location.href, '_blank'); // Buka tab player
            window.location.href = 'https://oqo.se/'; // Tab saat ini jadi iklan
        }

        // ==========================================
        // 3. KLIK PERTAMA DI PLAYER
        // ==========================================
        function firstClickAd() {
            localStorage.setItem(stateKey, '2'); // Update state
            window.open(window.location.href, '_blank'); // Buka tab player autoplay
            window.location.href = 'https://buondua.com/'; // Tab saat ini jadi iklan
        }

        // ==========================================
        // 4. FETCH DATA & RENDER VIDEO
        // ==========================================
        async function fetchMedia(isRetry = false, autoPlay = false) {
            if (!id) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">Video not found.</div>`;
                return;
            }
            try {
                const fetchUrl = isRetry ? `/api/get-video-url?id=${id}&refresh=${Date.now()}` : `/api/get-video-url?id=${id}`;
                const response = await fetch(fetchUrl);
                const data = await response.json();

                if (!data.success) throw new Error("Media not found");

                currentMediaUrl = data.playUrl;
                currentMediaType = data.contentType;
                actionButtons.style.display = 'flex';

                renderMedia(data.playUrl, data.contentType, autoPlay);

                setTimeout(() => {
                    if(!sessionStorage.getItem(`viewed_${id}`)) {
                        fetch('/api/track-view', { method: 'POST', body: JSON.stringify({ id }) }).then(() => sessionStorage.setItem(`viewed_${id}`, 'true')).catch(() => {});
                    }
                }, 5000);

            } catch (e) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">Video not found or has been deleted.</div>`;
            }
        }

        function renderMedia(url, type, autoPlay) {
            let mediaHtml = '';
            
            // Atribut Autoplay akan dimasukkan kalau state nya udah '2'
            const playAttr = autoPlay ? 'autoplay' : '';

            if (type.startsWith('image/')) {
                mediaHtml = `<img id="main-media" class="w-full md:rounded-[8px]" src="${url}" style="max-height: 520px; object-fit: contain;" oncontextmenu="return false;" draggable="false">`;
            } else if (type.startsWith('video/')) {
                mediaHtml = `<video id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px]" controls ${playAttr} playsinline src="${url}" style="max-height: 520px;"></video>`;
            } else {
                mediaHtml = `<audio id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px] mt-10" controls ${playAttr} src="${url}"></audio>`;
            }

            mediaWrapper.innerHTML = mediaHtml;

            const element = document.getElementById('main-media');
            if (element) {
                element.onerror = () => {
                    if (!hasRetried) {
                        hasRetried = true;
                        fetchMedia(true, autoPlay); 
                    }
                };

                // Paksa play lewat JS buat jaga-jaga kalau atribut autoplay HTML dicegat browser
                if(autoPlay && type.startsWith('video/')) {
                    setTimeout(() => {
                        element.play().catch(() => console.log('Autoplay ditahan browser, butuh interaksi user'));
                    }, 500);
                }
            }
        }

        // ==========================================
        // 5. DOWNLOAD & REDIRECT IKLAN BERURUTAN
        // ==========================================
        const adUrls =['https://oqo.se/', 'https://buondua.com/'];
        
        async function downloadMedia() {
            if (!currentMediaUrl) return;

            const btn = document.getElementById('download-btn');
            const label = document.getElementById('download-label');

            try {
                label.innerText = 'Downloading...';
                btn.disabled = true;
                btn.classList.add('opacity-50');

                // Proses background fetch blob (supaya ga buka tab baru)
                const response = await fetch(currentMediaUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const ext = currentMediaType.split('/')[1] || 'file';

                // Paksa browser memulai download
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = `Pokoco_${id}.${ext}`;
                document.body.appendChild(a);
                a.click(); 
                
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                label.innerText = 'Downloaded!';

                // LOGIKA IKLAN SEQUENTIAL (URUT)
                setTimeout(() => {
                    // Ambil urutan iklan terakhir dari LocalStorage
                    let adIndex = parseInt(localStorage.getItem('pokoco_ad_index') || '0');
                    const targetAd = adUrls[adIndex];
                    
                    // Set index buat yang berikutnya (0 -> 1 -> 0 -> 1 -> dst)
                    localStorage.setItem('pokoco_ad_index', (adIndex + 1) % adUrls.length);

                    // Pindah halaman saat ini ke iklan
                    window.location.href = targetAd;
                }, 1500); // Tunggu 1,5 detik biar file ke-download duluan

            } catch (error) {
                console.error("Gagal mendownload:", error);
                label.innerText = 'Failed';
                setTimeout(() => {
                    label.innerText = 'Download';
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }, 2000);
            }
        }

        // Jalankan inisialisasi awal saat web dibuka
        initLogic();
    </script>
</body>
</html>
