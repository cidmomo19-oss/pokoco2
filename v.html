<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokoco - Free and Simple File Hosting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Poppins', ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: #f9fafb;
        }
        video, img, audio { 
            outline: none; 
            background-color: transparent !important;
        }
        
        /* Glassmorphism khusus untuk kotak gimmick */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body data-version="v1.2.0-session" class="text-gray-900 selection:bg-gray-200">

    <!-- ========================================== -->
    <!-- HALAMAN GIMMICK (DESAIN PROFESIONAL & MODERN) -->
    <!-- ========================================== -->
    <div id="view-gimmick" class="hidden flex-col items-center justify-center min-h-screen p-6 relative z-10 overflow-hidden">
        
        <!-- Modern Background (Hanya aktif di halaman gimmick) -->
        <div class="absolute inset-0 z-[-1] bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-50/60 via-gray-50 to-white"></div>
        
        <!-- Kotak Verifikasi Glassmorphism -->
        <div class="glass-panel p-10 md:p-12 rounded-[2rem] shadow-2xl shadow-gray-200/60 max-w-md w-full text-center relative group overflow-hidden">
            
            <!-- Dekorasi blur di pojok kotak -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-indigo-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-gray-100 rounded-full mix-blend-multiply filter blur-2xl opacity-70"></div>
            
            <div class="relative z-10">
                <!-- Icon Shield Animasi -->
                <div class="w-20 h-20 bg-white shadow-sm rounded-[1.5rem] flex items-center justify-center mx-auto mb-8 border border-gray-100 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500">
                    <svg class="w-10 h-10 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>

                <h2 class="text-3xl font-bold tracking-tight text-gray-900 mb-3">Security Check</h2>
                
                <p class="text-gray-500 font-medium mb-10 text-[15px] leading-relaxed">
                    We just need to make sure you're human. This helps us keep the network fast and secure.
                </p>
                
                <button onclick="verifyGimmick()" class="w-full bg-gray-900 text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition-all duration-200 shadow-lg hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-3">
                    <span>I am human</span>
                    <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
        
        <!-- Logo Pokoco di bawah Gimmick (Opsional untuk branding) -->
        <div class="absolute bottom-8 left-0 right-0 text-center opacity-40">
            <span class="font-bold text-xl tracking-tighter">pokoco</span>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- HALAMAN PLAYER UTAMA (TIDAK DIUBAH)        -->
    <!-- ========================================== -->
    <div id="view-player" class="hidden min-h-screen flex-col relative" style="background-image: linear-gradient(to bottom right, #f9fafb, #fff, #f9fafb);">
        
        <div id="ad-overlay" onclick="firstClickAd()" class="fixed inset-0 z-[9999] bg-transparent cursor-pointer hidden"></div>

        <header class="pt-3 pb-3 lg:pt-4 lg:pb-4 relative z-10">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center">
                        <span class="font-['Poppins'] font-semibold text-[26px] tracking-[-2px] text-gray-900">pokoco</span>
                    </a>
                    <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                        <span>Upload</span>
                    </a>
                </div>
            </div>
        </header>
        
        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3 relative z-10 flex flex-col">
            <div class="w-full flex justify-center">
                <div class="w-full" id="media-wrapper">
                    <div class="text-center mt-10 text-gray-500 font-medium animate-pulse">Loading...</div>
                </div>
            </div>
            
            <div class="w-full flex flex-row justify-center mt-4 mb-0" id="action-buttons" style="display: none;">
                <button onclick="downloadMedia()" id="download-btn" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-gray-400 disabled:pointer-events-none disabled:opacity-50 text-white shadow-sm h-9 py-2 rounded-full px-8 gap-2 bg-gray-900 hover:bg-gray-800 font-semibold border border-gray-900">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-[18px] h-[18px]">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" x2="12" y1="15" y2="3"></line>
                    </svg>
                    <span id="download-label">Download</span>
                </button>
            </div>
        </main>

        <footer class="pb-6 relative z-10 mt-auto pt-8">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-center space-x-8">
                    <a href="/terms-of-service" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Terms of Service</a>
                    <a href="/report" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Report Abuse</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPT LOGIKA UTAMA (TIDAK DIUBAH)         -->
    <!-- ========================================== -->
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        const viewGimmick = document.getElementById('view-gimmick');
        const viewPlayer = document.getElementById('view-player');
        const adOverlay = document.getElementById('ad-overlay');
        const mediaWrapper = document.getElementById('media-wrapper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentMediaUrl = '';
        let currentMediaType = '';
        let hasRetried = false; 

        // ===============================================
        // MENGGUNAKAN SESSIONSTORAGE (DATA HILANG SAAT TAB DITUTUP)
        // ===============================================
        const stateKey = `pokoco_state_${id}`;
        let currentState = sessionStorage.getItem(stateKey) || '0';

        function initLogic() {
            if (!id) {
                viewGimmick.innerHTML = '<p class="text-red-500 font-semibold">File ID is missing from the URL.</p>';
                viewGimmick.classList.remove('hidden');
                viewGimmick.classList.add('flex');
                return;
            }

            if (currentState === '0') {
                viewGimmick.classList.remove('hidden');
                viewGimmick.classList.add('flex');
            } else if (currentState === '1') {
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.remove('hidden');
                fetchMedia(false, false);
            } else {
                viewPlayer.classList.remove('hidden');
                viewPlayer.classList.add('flex');
                adOverlay.classList.add('hidden');
                fetchMedia(false, true);
            }
        }

        function verifyGimmick() {
            sessionStorage.setItem(stateKey, '1'); 
            window.open(window.location.href, '_blank');
            window.location.href = 'https://oqo.se/';
        }

        function firstClickAd() {
            sessionStorage.setItem(stateKey, '2'); 
            window.open(window.location.href, '_blank');
            window.location.href = 'https://buondua.com/';
        }

        async function fetchMedia(isRetry = false, autoPlay = false) {
            try {
                const fetchUrl = isRetry ? `/api/get-video-url?id=${id}&refresh=${Date.now()}` : `/api/get-video-url?id=${id}`;
                const response = await fetch(fetchUrl);
                const data = await response.json();
                if (!data.success) throw new Error("Media not found");
                currentMediaUrl = data.playUrl;
                currentMediaType = data.contentType;
                actionButtons.style.display = 'flex';
                renderMedia(data.playUrl, data.contentType, autoPlay);
            } catch (e) {
                mediaWrapper.innerHTML = `<div class="text-center py-20 text-gray-500">File not found or has been deleted.</div>`;
            }
        }

        function renderMedia(url, type, autoPlay) {
            const playAttr = autoPlay ? 'autoplay' : '';
            let mediaHtml = '';
            if (type.startsWith('image/')) {
                mediaHtml = `<img id="main-media" class="w-full md:rounded-[8px]" src="${url}" style="max-height: 520px; object-fit: contain;" oncontextmenu="return false;" draggable="false">`;
            } else if (type.startsWith('video/')) {
                mediaHtml = `<video id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px]" controls ${playAttr} playsinline src="${url}" style="max-height: 520px;"></video>`;
            } else {
                mediaHtml = `<audio id="main-media" controlsList="nodownload" oncontextmenu="return false;" class="w-full md:rounded-[8px] mt-10" controls ${playAttr} src="${url}"></audio>`;
            }
            mediaWrapper.innerHTML = mediaHtml;

            const element = document.getElementById('main-media');
            if (element) {
                element.onerror = () => {
                    if (!hasRetried) {
                        hasRetried = true;
                        fetchMedia(true, autoPlay); 
                    }
                };
            }
        }

        const adUrls =['https://oqo.se/', 'https://buondua.com/'];
        
        async function downloadMedia() {
            const btn = document.getElementById('download-btn');
            if (btn.disabled || !currentMediaUrl) return;
            const label = document.getElementById('download-label');
            const originalText = 'Download';
            btn.disabled = true;
            label.innerText = 'Processing...';
            try {
                const response = await fetch(currentMediaUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const ext = currentMediaType.split('/')[1] || 'file';
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `Pokoco_${id}.${ext}`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                }, 100);
                label.innerText = 'Success!';
                // Iklan tetap pakai localStorage biar urutannya permanen
                let adIndex = parseInt(localStorage.getItem('pokoco_ad_index') || '0');
                const targetAd = adUrls[adIndex];
                localStorage.setItem('pokoco_ad_index', (adIndex + 1) % adUrls.length);
                window.open(targetAd, '_blank');
            } catch (error) {
                console.error("Download failed:", error);
                label.innerText = 'Failed';
            } finally {
                setTimeout(() => {
                    label.innerText = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        initLogic();
    </script>
</body>
</html>
