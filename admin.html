<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokoco - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background-color: #1e293b; border: 1px solid #334155; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        /* Style Checkbox Custom */
        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #2563eb;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 pb-24">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="w-full max-w-md mt-20 glass-panel p-8 rounded-2xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold mb-2">Admin Login</h1>
        <p class="text-slate-400 text-sm mb-6">Enter password to access dashboard</p>
        <input type="password" id="password-input" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-4 text-center" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Login</button>
        <p id="login-error" class="text-red-400 text-sm mt-4 hidden">Incorrect password!</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="w-full max-w-6xl hidden flex-col gap-6">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 glass-panel p-6 rounded-2xl">
            <div>
                <h1 class="text-2xl font-bold">Admin Dashboard</h1>
                <p class="text-slate-400 text-sm">Manage, Filter, and Process Media</p>
            </div>
            <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300 px-4 py-2 border border-red-900/50 rounded-lg bg-red-900/20 transition">Logout</button>
        </div>

        <!-- FILTERS & ACTIONS -->
        <div class="glass-panel p-6 rounded-2xl grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-xs text-slate-400 uppercase tracking-wider mb-2">Minimum Total Views</label>
                <input type="number" id="filter-views" placeholder="e.g. 50" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none" oninput="applyFilters()">
            </div>
            <div>
                <label class="block text-xs text-slate-400 uppercase tracking-wider mb-2">Upload Date</label>
                <input type="date" id="filter-date" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none [color-scheme:dark]" onchange="applyFilters()">
            </div>
            <div class="flex gap-2">
                <button onclick="clearFilters()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 rounded-lg transition">Clear</button>
                <button onclick="fetchData()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Refresh</button>
                <button id="btn-process" onclick="runDailyProcess()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg transition">⚙️ Proses Harian</button>
            </div>
        </div>

        <!-- STATS & TABLE -->
        <div class="glass-panel rounded-2xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <h2 class="font-semibold text-lg">Media List</h2>
                <div class="flex gap-2">
                    <span id="selected-count" class="hidden text-sm bg-orange-900/50 text-orange-300 py-1 px-3 rounded-full border border-orange-800">Selected: 0</span>
                    <span id="total-count" class="text-sm bg-blue-900/50 text-blue-300 py-1 px-3 rounded-full">Total: 0</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-900/50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-4 w-10">
                                <input type="checkbox" id="select-all-checkbox" onclick="toggleSelectAll(this)">
                            </th>
                            <th class="px-6 py-4 font-medium">Video ID</th>
                            <th class="px-6 py-4 font-medium">Views (Total) ↓</th>
                            <th class="px-6 py-4 font-medium">Views (Siklus)</th>
                            <th class="px-6 py-4 font-medium">Upload Date</th>
                            <th class="px-6 py-4 font-medium">Type</th>
                            <th class="px-6 py-4 font-medium text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-700/50">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="loading-indicator" class="p-10 text-center text-slate-400 hidden">
                <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-blue-500 rounded-full animate-spin mb-2"></div>
                <p>Loading data...</p>
            </div>
        </div>
    </div>

    <!-- BULK ACTION BAR (Floating) -->
    <div id="bulk-action-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 glass-panel p-4 rounded-2xl shadow-2xl flex items-center gap-6 border-blue-500/50 hidden animate-bounce-short">
        <p class="text-sm font-semibold"><span id="bulk-count" class="text-blue-400">0</span> item terpilih</p>
        <div class="flex gap-2">
            <button onclick="cancelSelection()" class="px-4 py-2 text-xs bg-slate-700 hover:bg-slate-600 rounded-lg transition">Batal</button>
            <button onclick="deleteSelected()" class="px-4 py-2 text-xs bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition shadow-lg shadow-red-900/20">Hapus Permanen</button>
        </div>
    </div>

    <script>
        let adminPassword = sessionStorage.getItem('admin_pw') || '';
        let allData = [];
        let filteredData = []; // Menyimpan data yang sedang tampil
        let selectedIds = new Set();

        if (adminPassword) {
            showDashboard();
            fetchData();
        }

        async function login() {
            const input = document.getElementById('password-input').value;
            if (!input) return;
            adminPassword = input;
            
            const res = await fetch(`/api/admin/videos?pw=${encodeURIComponent(adminPassword)}`);
            if (res.ok) {
                sessionStorage.setItem('admin_pw', adminPassword);
                showDashboard();
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                adminPassword = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_pw');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('flex');
        }

        async function fetchData() {
            document.getElementById('table-body').innerHTML = '';
            document.getElementById('loading-indicator').classList.remove('hidden');
            selectedIds.clear();
            updateBulkBar();

            try {
                const res = await fetch(`/api/admin/videos?pw=${encodeURIComponent(adminPassword)}`);
                if (!res.ok) throw new Error("Unauthorized");
                
                const data = await res.json();
                allData = data.videos || [];
                applyFilters();

            } catch (err) {
                alert("Session expired or wrong password.");
                logout();
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden');
            }
        }

        // --- FILTER LOGIC ---
        function applyFilters() {
            const minViews = parseInt(document.getElementById('filter-views').value) || 0;
            const filterDate = document.getElementById('filter-date').value;

            filteredData = allData.filter(item => {
                if (item.views < minViews) return false;
                if (filterDate) {
                    const itemDate = item.created_at.split(' ')[0];
                    if (itemDate !== filterDate) return false;
                }
                return true;
            });

            renderTable(filteredData);
            updateSelectAllCheckbox();
        }

        function clearFilters() {
            document.getElementById('filter-views').value = '';
            document.getElementById('filter-date').value = '';
            applyFilters();
        }

        // --- SELECTION LOGIC ---
        function toggleSelectItem(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateBulkBar();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll(mainCheckbox) {
            if (mainCheckbox.checked) {
                filteredData.forEach(item => selectedIds.add(item.id));
            } else {
                filteredData.forEach(item => selectedIds.delete(item.id));
            }
            renderTable(filteredData);
            updateBulkBar();
        }

        function updateSelectAllCheckbox() {
            const checkbox = document.getElementById('select-all-checkbox');
            if (filteredData.length === 0) {
                checkbox.checked = false;
                return;
            }
            const allVisibleSelected = filteredData.every(item => selectedIds.has(item.id));
            checkbox.checked = allVisibleSelected;
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulk-action-bar');
            const countLabel = document.getElementById('bulk-count');
            const selectedBadge = document.getElementById('selected-count');
            
            if (selectedIds.size > 0) {
                bar.classList.remove('hidden');
                countLabel.innerText = selectedIds.size;
                selectedBadge.classList.remove('hidden');
                selectedBadge.innerText = `Selected: ${selectedIds.size}`;
            } else {
                bar.classList.add('hidden');
                selectedBadge.classList.add('hidden');
            }
        }

        function cancelSelection() {
            selectedIds.clear();
            renderTable(filteredData);
            updateBulkBar();
            document.getElementById('select-all-checkbox').checked = false;
        }

        // --- ACTION LOGIC ---
        async function deleteVideo(id) {
            if (!confirm(`Hapus video ID: ${id}?`)) return;
            await executeDelete([id]);
        }

        async function deleteSelected() {
            const count = selectedIds.size;
            if (!confirm(`PERINGATAN KERAS!\n\nAnda akan menghapus ${count} video sekaligus secara permanen dari Database dan R2.\n\nLanjutkan?`)) return;
            
            await executeDelete(Array.from(selectedIds));
        }

        async function executeDelete(ids) {
            try {
                // Catatan: Jika API backend Anda hanya menerima 1 ID, 
                // kita harus melakukan loop fetch atau update backendnya.
                // Di sini saya asumsikan backend bisa menerima array atau 
                // kita kirim satu-satu jika API-nya lama.
                
                let successCount = 0;
                for (const id of ids) {
                    const res = await fetch('/api/admin/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id, pw: adminPassword })
                    });
                    if (res.ok) successCount++;
                }

                alert(`Berhasil menghapus ${successCount} data.`);
                fetchData(); // Refresh data
            } catch (e) {
                alert("Terjadi kesalahan saat proses penghapusan.");
            }
        }

        async function runDailyProcess() {
            const confirmProcess = confirm("Jalankan proses harian (Hapus < 100 views, Reset > 100 views)?");
            if (!confirmProcess) return;
            
            const button = document.getElementById('btn-process');
            button.disabled = true;
            button.innerHTML = '⚙️ Memproses...';

            try {
                const res = await fetch('/api/admin/daily-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pw: adminPassword })
                });
                const data = await res.json();
                alert(data.message || "Proses selesai");
                fetchData();
            } catch (e) {
                alert("Error koneksi");
            } finally {
                button.disabled = false;
                button.innerHTML = '⚙️ Proses Harian';
            }
        }

        function copyLink(id) {
            const url = window.location.origin + '/v?id=' + id;
            navigator.clipboard.writeText(url);
            alert("Link dikopi!");
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            document.getElementById('total-count').innerText = `Total: ${data.length}`;
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500">No media found.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => {
                const dateObj = new Date(item.created_at + "Z");
                const dateStr = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const typeShort = item.content_type ? item.content_type.split('/')[0] : 'unknown';
                const isSelected = selectedIds.has(item.id);
                
                let badgeColor = 'bg-slate-700 text-slate-300';
                if(typeShort === 'video') badgeColor = 'bg-purple-900/50 text-purple-300 border border-purple-800';
                if(typeShort === 'image') badgeColor = 'bg-blue-900/50 text-blue-300 border border-blue-800';

                const periodViews = item.period_views || 0;
                const bulananAman = (periodViews >= 100) ? 'text-green-400 font-bold' : 'text-orange-400 font-bold';

                return `
                <tr class="hover:bg-slate-800/50 transition-colors ${isSelected ? 'bg-blue-900/20' : ''}">
                    <td class="px-6 py-4">
                        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelectItem('${item.id}')">
                    </td>
                    <td class="px-6 py-4 font-mono text-slate-300">${item.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-200">${item.views.toLocaleString()}</td>
                    <td class="px-6 py-4 ${bulananAman}">${periodViews} / 100</td>
                    <td class="px-6 py-4 text-slate-400">${dateStr}</td>
                    <td class="px-6 py-4">
                        <span class="text-[10px] uppercase px-2 py-1 rounded-md ${badgeColor}">${typeShort}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="copyLink('${item.id}')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition">Copy</button>
                            <a href="/v?id=${item.id}" target="_blank" class="text-xs bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded transition">Open</a>
                            <button onclick="deleteVideo('${item.id}')" class="text-xs bg-red-600/80 hover:bg-red-500 text-white px-3 py-1.5 rounded transition">Delete</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
