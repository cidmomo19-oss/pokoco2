<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokoco - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Minimalist Base Styles */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Dark background */
            color: #f8fafc; /* Light text */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem; /* Consistent padding */
        }
        .glass-panel { 
            background-color: #1e293b; /* Darker panel background */
            border: 1px solid #334155; /* Subtle border */
            border-radius: 1rem; /* Rounded corners */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* Soft shadow */
        }
        .input-style {
            background-color: #020617; /* Even darker input background */
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.65rem 1rem;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-style:focus {
            border-color: #3b82f6; /* Blue border on focus */
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); /* Blue shadow on focus */
        }
        .button-style {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        /* Custom scrollbar for dark themes */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* Style for date input dark mode */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1); /* Makes the calendar icon white */
        }
        .table-action-button {
            padding: 0.5rem; /* Uniform padding */
            border-radius: 0.375rem; /* Rounded for small buttons */
            line-height: 1; /* Adjust line height for icon buttons */
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="w-full max-w-md mt-20 glass-panel p-8 text-center">
        <h1 class="text-3xl font-bold mb-2 text-white">Admin Login</h1>
        <p class="text-slate-400 text-sm mb-6">Enter password to access dashboard</p>
        <input type="password" id="password-input" class="w-full input-style mb-4 text-center" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()" class="w-full button-style bg-blue-600 hover:bg-blue-700 text-white">Login</button>
        <p id="login-error" class="text-red-400 text-sm mt-4 hidden">Incorrect password!</p>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboard-screen" class="w-full max-w-6xl hidden flex-col gap-6 p-4 md:p-0">
        <!-- Dashboard Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 glass-panel p-6">
            <div>
                <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
                <p class="text-slate-400 text-sm">Manage, filter, and process media assets</p>
            </div>
            <button onclick="logout()" class="button-style bg-red-900/20 hover:bg-red-900/30 text-red-400 border border-red-900/50">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1 0 12.728 0M12 2.25V12M12 12l2.25 2.25M12 12l-2.25 2.25" />
                </svg>
                Logout
            </button>
        </div>

        <!-- FILTERS & ACTIONS -->
        <div class="glass-panel p-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-xs text-slate-400 uppercase tracking-wider mb-2">Minimum Total Views</label>
                <input type="number" id="filter-views" placeholder="e.g. 50" class="w-full input-style" oninput="applyFilters()">
            </div>
            <div>
                <label class="block text-xs text-slate-400 uppercase tracking-wider mb-2">Upload Date</label>
                <input type="date" id="filter-date" class="w-full input-style [color-scheme:dark]" onchange="applyFilters()">
            </div>
            <div class="flex gap-2">
                <button onclick="clearFilters()" class="w-full button-style bg-slate-700 hover:bg-slate-600 text-white" title="Clear all applied filters">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    Clear Filters
                </button>
                <button onclick="fetchData()" class="w-full button-style bg-blue-600 hover:bg-blue-700 text-white" title="Refresh data from server">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.181m0 0h-4.992m0 0h-4.992m0 0l-3.181 3.181" />
                    </svg>
                    Refresh
                </button>
                
                <!-- TOMBOL PROSES HARIAN -->
                <button onclick="runDailyProcess()" class="w-full button-style bg-emerald-600 hover:bg-emerald-700 text-white" title="Jalankan proses hapus (jika gagal target) dan reset (jika lulus target)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.23c.55 0 1.02.398 1.11.94l.167.992c.092.547.566.92 1.12.92H19.5c.56 0 1.036.38 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c-.27.46-.777.715-1.297.715h-4.232c-.557 0-1.034.398-1.133.919l-.566 2.931c-.1.52.008 1.04.254 1.488l.656 1.133c.27.46.777.715 1.297.715h4.232c.557 0 1.034.398 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c-.27.46-.777.715-1.297.715H9.594c-.557 0-1.034-.398-1.133-.919l-.566-2.931c-.1-.52.008-1.04.254-1.488l.656-1.133c.27-.46.777-.715 1.297-.715H9.594c-.557 0-1.034-.398-1.133-.919l-.167-.992a4.524 4.524 0 0 0-.165-.245zM11.994 16.5c-2.209 0-4-1.791-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4z" />
                    </svg>
                    Proses Harian
                </button>
            </div>
        </div>

        <!-- MEDIA LIST TABLE -->
        <div class="glass-panel overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <h2 class="font-semibold text-lg text-white">Media List</h2>
                <span id="total-count" class="text-sm bg-blue-900/50 text-blue-300 py-1 px-3 rounded-full">Total: 0</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-slate-900/50 text-slate-400 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-4 font-medium">Video ID</th>
                            <th class="px-6 py-4 font-medium">Views (Total)</th>
                            <th class="px-6 py-4 font-medium">Views (Bulan Ini)</th>
                            <th class="px-6 py-4 font-medium">Upload Date</th>
                            <th class="px-6 py-4 font-medium">Type</th>
                            <th class="px-6 py-4 font-medium text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-700/50">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
            <div id="loading-indicator" class="p-10 text-center text-slate-400 hidden">
                <div class="inline-block w-6 h-6 border-2 border-slate-600 border-t-blue-500 rounded-full animate-spin mb-2"></div>
                <p>Loading data...</p>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = sessionStorage.getItem('admin_pw') || '';
        let allData = [];

        // Inisialisasi dashboard jika password ada di sessionStorage
        if (adminPassword) {
            showDashboard();
            fetchData();
        }

        async function login() {
            const input = document.getElementById('password-input').value;
            if (!input) return; // Jangan login jika input kosong
            adminPassword = input;
            
            // Coba fetch data untuk memverifikasi password
            const res = await fetch(`/api/admin/videos?pw=${encodeURIComponent(adminPassword)}`);
            if (res.ok) {
                sessionStorage.setItem('admin_pw', adminPassword); // Simpan password jika berhasil
                showDashboard();
                fetchData();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                adminPassword = ''; // Hapus password jika salah
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_pw'); // Hapus password dari sessionStorage
            location.reload(); // Muat ulang halaman untuk kembali ke login
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('flex'); // Pastikan dashboard visible
        }

        async function fetchData() {
            document.getElementById('table-body').innerHTML = ''; // Kosongkan tabel
            document.getElementById('loading-indicator').classList.remove('hidden'); // Tampilkan loading

            try {
                // Pastikan `api/admin/videos.js` mengambil kolom `period_views`
                // Contoh: SELECT id, views, period_views, content_type, created_at, ad_link FROM videos ORDER BY views DESC
                const res = await fetch(`/api/admin/videos?pw=${encodeURIComponent(adminPassword)}`);
                if (!res.ok) throw new Error("Unauthorized");
                
                const data = await res.json();
                allData = data.videos || [];
                applyFilters(); // Terapkan filter setelah data dimuat

            } catch (err) {
                alert("Session expired or wrong password. Please login again.");
                logout(); // Paksa logout jika ada error fetch
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden'); // Sembunyikan loading
            }
        }

        // ================================================================
        // FUNGSI UTAMA: MENJALANKAN PROSES HARIAN (HAPUS & RESET)
        // ================================================================
        async function runDailyProcess() {
            // Peringatan yang sangat jelas tentang apa yang akan terjadi
            const confirmProcess = confirm(
                "Yakin mau menjalankan PROSES HARIAN?\n\n" +
                "Ini akan melakukan DUA hal secara otomatis:\n" +
                "1. MENGHAPUS file yang umurnya > 30 hari & view bulanannya < 100.\n" +
                "2. MERESET file yang umurnya > 30 hari & view bulanannya >= 100 (diberi 30 hari lagi)."
            );

            if (!confirmProcess) return; // Batal jika user tidak setuju
            
            if (!adminPassword) {
                alert("Sesi admin tidak valid. Silakan login ulang.");
                return;
            }

            const button = event.target; // Dapatkan elemen tombol yang diklik
            button.disabled = true; // Nonaktifkan tombol
            button.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 animate-spin">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.23c.55 0 1.02.398 1.11.94l.167.992c.092.547.566.92 1.12.92H19.5c.56 0 1.036.38 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c-.27.46-.777.715-1.297.715h-4.232c-.557 0-1.034.398-1.133.919l-.566 2.931c-.1.52.008 1.04.254 1.488l.656 1.133c.27.46.777.715 1.297.715h4.232c.557 0 1.034.398 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c.27.46-.777-.715-1.297-.715H9.594c-.557 0-1.034-.398-1.133-.919l-.566-2.931c-.1-.52.008-1.04.254-1.488l.656-1.133c-.27-.46.777-.715 1.297-.715H9.594c-.557 0-1.034-.398-1.133-.919l-.167-.992a4.524 4.524 0 0 0-.165-.245zM11.994 16.5c-2.209 0-4-1.791-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4z" />
                </svg>
                Memproses...`; // Tampilkan icon loading
            button.classList.add('bg-emerald-700'); // Sedikit gelap saat loading

            try {
                const res = await fetch('/api/admin/daily-process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pw: adminPassword })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alert(data.message);
                    fetchData(); // Muat ulang tabel setelah proses
                } else {
                    alert("Gagal Proses: " + (data.message || "Error tidak diketahui"));
                }
            } catch (e) {
                alert("Terjadi kesalahan jaringan saat proses harian.");
            } finally {
                // Kembalikan tombol ke kondisi normal
                button.disabled = false;
                button.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.23c.55 0 1.02.398 1.11.94l.167.992c.092.547.566.92 1.12.92H19.5c.56 0 1.036.38 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c-.27.46-.777.715-1.297.715h-4.232c-.557 0-1.034.398-1.133.919l-.566 2.931c-.1.52.008 1.04.254 1.488l.656 1.133c.27.46.777.715 1.297.715h4.232c.557 0 1.034.398 1.133.919l.566 2.931c.1.52.008 1.04-.254 1.488l-.656 1.133c-.27.46-.777-.715-1.297-.715H9.594c-.557 0-1.034-.398-1.133-.919l-.167-.992a4.524 4.524 0 0 0-.165-.245zM11.994 16.5c-2.209 0-4-1.791-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4z" />
                    </svg>
                    Proses Harian`;
                button.classList.remove('bg-emerald-700');
                button.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
            }
        }

        // FUNGSI HAPUS 1 VIDEO MANUAL
        async function deleteVideo(id) {
            const confirmDelete = confirm(`PERINGATAN!\nApakah Abang yakin mau menghapus PERMANEN video ID: ${id}?\n\nIni akan menghapus data dari Database D1 dan file aslinya di R2 secara permanen dan tidak bisa dikembalikan!`);
            
            if (!confirmDelete) return;

            try {
                const res = await fetch('/api/admin/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, pw: adminPassword })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alert("Video dan Data berhasil dihapus.");
                    fetchData();
                } else {
                    alert("Gagal menghapus: " + (data.message || "Error tidak diketahui"));
                }
            } catch (e) {
                alert("Terjadi kesalahan jaringan saat menghapus.");
            }
        }

        function applyFilters() {
            const minViews = parseInt(document.getElementById('filter-views').value) || 0;
            const filterDate = document.getElementById('filter-date').value;

            const filteredData = allData.filter(item => {
                if (item.views < minViews) return false;
                if (filterDate) {
                    const itemDate = item.created_at.split(' ')[0]; // Ambil hanya tanggalnya
                    if (itemDate !== filterDate) return false;
                }
                return true;
            });

            renderTable(filteredData);
        }

        function clearFilters() {
            document.getElementById('filter-views').value = '';
            document.getElementById('filter-date').value = '';
            applyFilters();
        }

        function copyLink(id) {
            const url = window.location.origin + '/v?id=' + id;
            navigator.clipboard.writeText(url);
            alert("Link copied: " + url);
        }

        // FUNGSI UNTUK MERENDER DATA KE TABEL
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            document.getElementById('total-count').innerText = `Total: ${data.length}`;
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">No media found matching criteria.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => {
                // Konversi tanggal ke format yang lebih mudah dibaca
                const dateObj = new Date(item.created_at + "Z"); // Anggap created_at sebagai UTC
                const dateStr = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                
                // Ambil tipe konten, default 'unknown' jika tidak ada
                const typeShort = item.content_type ? item.content_type.split('/')[0] : 'unknown';
                
                let badgeColor = 'bg-slate-700 text-slate-300 border border-slate-800'; // Default
                if(typeShort === 'video') badgeColor = 'bg-purple-900/50 text-purple-300 border border-purple-800';
                if(typeShort === 'image') badgeColor = 'bg-blue-900/50 text-blue-300 border border-blue-800';
                if(typeShort === 'audio') badgeColor = 'bg-emerald-900/50 text-emerald-300 border border-emerald-800';

                // Ambil period_views, default 0 jika undefined (untuk data lama)
                const periodViews = item.period_views !== undefined ? item.period_views : 0;
                
                // Styling untuk views bulanan (hijau jika >= 100, orange jika < 100)
                const bulananAman = (periodViews >= 100) ? 'text-green-400 font-bold' : 'text-orange-400 font-bold';

                return `
                <tr class="hover:bg-slate-800/50 transition-colors">
                    <td class="px-6 py-4 font-mono text-slate-300">${item.id}</td>
                    
                    <!-- TOTAL VIEW -->
                    <td class="px-6 py-4 font-bold text-slate-200">${item.views.toLocaleString()}</td>
                    
                    <!-- VIEW BULAN INI -->
                    <td class="px-6 py-4 ${bulananAman}">${periodViews} / 100</td>
                    
                    <td class="px-6 py-4 text-slate-400">${dateStr}</td>
                    <td class="px-6 py-4">
                        <span class="text-[10px] uppercase px-2 py-1 rounded-md ${badgeColor}">${typeShort}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="copyLink('${item.id}')" class="text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 table-action-button" title="Copy Link">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.313 0l1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244" />
                                </svg>
                            </button>
                            <a href="/v?id=${item.id}" target="_blank" class="text-white bg-blue-600 hover:bg-blue-500 table-action-button" title="Open Media">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                                </svg>
                            </a>
                            <button onclick="deleteVideo('${item.id}')" class="text-white bg-red-600 hover:bg-red-500 table-action-button" title="Delete Permanently">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.166m10.126 0a48.11 48.11 0 01-7.678 0m-4.048 0c-1.133 0-2.378.077-3.655.202M2.25 7.5h19.5v-.275c0-1.637-1.313-2.962-2.936-2.962H5.186C3.563 4.263 2.25 5.588 2.25 7.225V7.5z" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
