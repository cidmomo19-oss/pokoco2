<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a" />
    <title>Pokoco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .upload-box { background-color: #1e293b; border: 2px dashed #334155; }
        .btn-main { background-color: #1e293b; border: 1px solid #334155; }
        #history-sidebar { transform: translateX(100%); transition: 0.3s; }
        #history-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <header class="py-4 lg:py-5 px-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="/" class="font-semibold text-[26px] tracking-[-2px]">pokoco</a>
        <div class="flex gap-3">
            <button onclick="toggleHistory()" class="text-[13px] font-semibold text-slate-400">History</button>
            <button onclick="openAuth()" class="btn-main px-4 py-1.5 rounded-full text-[13px] font-semibold">Login</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-6">
        <div class="w-full max-w-[500px]">
            <div id="upload-container" class="upload-box rounded-2xl p-10 text-center cursor-pointer hover:border-slate-400 transition-all">
                <input type="file" id="file-input" class="hidden" accept="video/*,image/*">
                
                <!-- Tampilan Awal -->
                <div id="view-empty">
                    <div class="text-slate-500 mb-4 text-4xl"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                    <p class="font-semibold text-white">Select Video or Image</p>
                    <p class="text-[11px] text-slate-500 mt-1 uppercase tracking-widest">Max 200MB</p>
                </div>

                <!-- Tampilan Preview -->
                <div id="view-preview" class="hidden">
                    <div id="preview-box" class="w-full aspect-video bg-black/20 rounded-lg mb-4 flex items-center justify-center overflow-hidden"></div>
                    <p id="file-name" class="text-[10px] text-slate-500 truncate mb-4"></p>
                    <div class="flex gap-2">
                        <button onclick="resetUpload()" class="flex-1 py-2 bg-slate-700 rounded-full text-[12px]">Cancel</button>
                        <button onclick="doUpload()" class="flex-1 py-2 bg-blue-600 rounded-full text-[12px] font-bold">Upload Now</button>
                    </div>
                </div>

                <!-- Tampilan Progress -->
                <div id="view-progress" class="hidden py-6">
                    <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden mb-2">
                        <div id="bar" class="bg-blue-500 h-full w-0 transition-all"></div>
                    </div>
                    <p id="percent" class="text-[10px] text-slate-500 uppercase">0% Uploading...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Sidebar History -->
    <div id="history-sidebar" class="fixed top-0 right-0 h-full w-80 bg-[#1e293b] z-50 p-6 shadow-2xl border-l border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold">Recent</h3>
            <button onclick="toggleHistory()" class="text-xl">&times;</button>
        </div>
        <div id="list" class="space-y-3 overflow-y-auto h-[80%]"></div>
    </div>

    <!-- Login Modal Sederhana -->
    <div id="auth-modal" class="fixed inset-0 bg-black/70 hidden z-[60] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#1e293b] w-full max-w-xs p-6 rounded-2xl border border-slate-700">
            <h2 class="font-bold mb-4">Login</h2>
            <input type="email" id="email" placeholder="Email" class="w-full bg-[#0f172a] p-3 rounded-xl mb-3 text-sm border border-slate-700">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-[#0f172a] p-3 rounded-xl mb-4 text-sm border border-slate-700">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm">Sign In</button>
            <button onclick="closeAuth()" class="w-full mt-2 text-xs text-slate-500">Cancel</button>
        </div>
    </div>

    <script>
        const fInput = document.getElementById('file-input');
        const container = document.getElementById('upload-container');
        let selectedFile = null;

        container.onclick = (e) => { if(e.target === container || container.contains(e.target)) if(!selectedFile) fInput.click(); };
        fInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(!selectedFile) return;
            document.getElementById('view-empty').classList.add('hidden');
            document.getElementById('view-preview').classList.remove('hidden');
            document.getElementById('file-name').innerText = selectedFile.name;
            
            const url = URL.createObjectURL(selectedFile);
            const box = document.getElementById('preview-box');
            box.innerHTML = selectedFile.type.startsWith('image') ? `<img src="${url}" class="h-full object-contain">` : `<video src="${url}" muted autoplay loop class="h-full object-contain"></video>`;
        };

        function resetUpload() { location.reload(); }

        async function doUpload() {
            document.getElementById('view-preview').classList.add('hidden');
            document.getElementById('view-progress').classList.remove('hidden');

            const res = await fetch(`/api/get-upload-url?type=${encodeURIComponent(selectedFile.type)}&name=${encodeURIComponent(selectedFile.name)}`);
            const data = await res.json();

            const xhr = new XMLHttpRequest();
            xhr.open('PUT', data.uploadUrl);
            xhr.upload.onprogress = (e) => {
                const p = Math.round((e.loaded / e.total) * 100);
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('percent').innerText = p + '% Uploading...';
            };
            xhr.onload = () => {
                if(xhr.status === 200) window.location.href = '/v?id=' + data.videoId;
            };
            xhr.send(selectedFile);
        }

        function toggleHistory() { document.getElementById('history-sidebar').classList.toggle('open'); }
        function openAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }
    </script>
</body>
</html>
